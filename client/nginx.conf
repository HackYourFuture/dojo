server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

   # Security headers
    server_tokens off;
    add_header Content-Security-Policy "default-src 'self';base-uri 'self';font-src 'self' https: data:;form-action 'self';frame-ancestors 'self';img-src 'self' data: https://*.hackyourfuture.net https://*.digitaloceanspaces.com;object-src 'none';script-src 'self' https://accounts.google.com;script-src-attr 'none';style-src 'self';upgrade-insecure-requests" always;
    add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;
    add_header Cross-Origin-Resource-Policy "same-site" always;
    add_header Origin-Agent-Cluster "?1" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-DNS-Prefetch-Control "off" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Permitted-Cross-Domain-Policies "none" always;
    add_header X-XSS-Protection "0" always;

    # Proxy API requests to the backend.
    # BACKEND_URL must NOT have a trailing slash (e.g. https://dojo-test.hackyourfuture.net)
    location /api/ {
        proxy_pass ${BACKEND_URL};
        proxy_ssl_server_name on;
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Proxy API docs requests to the backend.
    location /api-docs/ {
        proxy_pass ${BACKEND_URL};
        proxy_ssl_server_name on;
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Fallback to index.html for client-side routing (React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
